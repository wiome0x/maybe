import_market_data:
  cron: "0 22 * * 1-5" # 5:00 PM EST / 6:00 PM EDT (NY time) Monday through Friday
  class: "ImportMarketDataJob"
  queue: "scheduled"
  description: "Imports market data daily at 5:00 PM EST (1 hour after market close)"
  args:
    mode: "full"
    clear_cache: false

sync_broker_connections:
  cron: "0 6 * * *" # 6:00 AM UTC daily — after overnight market settlement
  class: "ScheduledBrokerSyncJob"
  queue: "scheduled"
  description: "Daily sync of all active broker connections (Binance, Schwab) to refresh balances and trade history"
  
clean_syncs:
  cron: "0 * * * *" # every hour
  class: "SyncCleanerJob"
  queue: "scheduled"
  description: "Cleans up stale syncs"

import_market_news:
  cron: "0 * * * *" # every hour
  class: "ImportMarketNewsJob"
  queue: "scheduled"
  description: "Refreshes persisted market news hourly"

dispatch_bark_notifications:
  cron: "*/15 * * * *"
  class: "DispatchBarkNotificationsJob"
  queue: "scheduled"
  description: "Dispatches due Bark notification batches every 15 minutes"

run_security_health_checks:
  cron: "0 2 * * 1-5" # 2:00 AM EST / 3:00 AM EDT (NY time) Monday through Friday
  class: "SecurityHealthCheckJob"
  queue: "scheduled"
  description: "Runs security health checks to detect issues with security data"

clean_api_request_logs:
  cron: "0 3 * * *"
  class: "ApiRequestLogCleanupJob"
  queue: "scheduled"
  description: "Cleans up API request logs older than 90 days"

dispatch_weekly_reports:
  cron: "0 * * * *"
  class: "WeeklyReportDispatchJob"
  queue: "scheduled"
  description: "Generates and sends due weekly reports every hour"
